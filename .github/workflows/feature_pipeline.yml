name: Hourly Feature Pipeline

on:
  schedule:
    # Runs every hour at minute 0 (UTC)
    - cron: "0 * * * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: hourly-feature-pipeline
  cancel-in-progress: false

jobs:
  run-hourly-feature-pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    env:
      CITY_NAME: Hyderabad
      COUNTRY_CODE: PK
      TIMEZONE: Asia/Karachi

      LATITUDE: "25.3960"
      LONGITUDE: "68.3578"

      FORECAST_PAST_DAYS: "2"
      FORECAST_DAYS: "5"
      PREDICTION_HOURS: "72"

      HOPSWORKS_HOST: ${{ secrets.HOPSWORKS_HOST }}
      HOPSWORKS_PROJECT: ${{ secrets.HOPSWORKS_PROJECT }}
      HOPSWORKS_API_KEY: ${{ secrets.HOPSWORKS_API_KEY }}
      HOPSWORKS_ONLINE_ENABLED: "false"

      FORECAST_FEATURE_GROUP_NAME: aqi_openmeteo_19f_forecast_fg
      FORECAST_FEATURE_GROUP_VERSION: "1"

      FORECAST_FEATURE_OUTPUT_PATH: reports/latest_72h_forecast_features.csv

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install "hopsworks[python]==4.7.*"

      - name: Create output folders
        run: |
          mkdir -p reports data models

      - name: Run feature pipeline
        run: |
          python pipelines/feature_pipeline.py

      - name: Upload feature pipeline artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: hourly-forecast-features
          path: |
            reports/latest_72h_forecast_features.csv
            reports/latest_forecast_context_raw_plus_derived.csv
          if-no-files-found: warn
